name: Build macOS App
# Run this workflow manually from the Actions tab, and also on every tag push.
on:
  workflow_dispatch:        # lets you click "Run workflow" in the Actions tab
  push:
    tags:
      - "v*"                # also builds when you push a tag like v1.0
jobs:
  build-macos:
    runs-on: macos-latest   # GitHub's hosted Mac — no physical Mac needed
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager requests PyPDF2 python-docx Pillow pdf2docx
          pip install pyinstaller
      - name: Build the .app with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
            --name "ConcordAptConverter" \
            --collect-all selenium \
            --collect-all webdriver_manager \
            final_concord_convertV4.py
      - name: Zip the .app (preserves Mac permissions)
        run: |
          cd dist
          # Prefer the .app bundle; fall back to the bare binary if needed.
          if [ -d "ConcordAptConverter.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "ConcordAptConverter.app" "ConcordAptConverter-macOS.zip"
          else
            ditto -c -k --keepParent "ConcordAptConverter" "ConcordAptConverter-macOS.zip"
          fi
      - name: Upload the built app as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: ConcordAptConverter-macOS
          path: dist/ConcordAptConverter-macOS.zip
          if-no-files-found: error
